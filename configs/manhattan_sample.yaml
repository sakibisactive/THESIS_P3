name: "Manhattan SUMO Smoke Test"
simulation:
  mode: "sumo"
  dt: 1.0
  max_steps: 3600
  osm_file: null
  network_file: "data/networks/midtown_manhattan.net.xml"
  route_file: null
  scenario_file: "data/scenarios/manhattan.yaml"
  output_dir: "outputs"
  sumo_binary: "sumo"
  use_gui: false
  step_length: 1.0
  seed: 42
  traci_port: 8813
  enable_subscriptions: true
  real_time_factor: -1.0

battery:
  capacity_kwh: 60.0
  mass_kg: 1500.0
  efficiency: 0.9
  drag_coeff: 0.25
  frontal_area: 2.2
  rolling_res_coeff: 0.01
  regen_efficiency: 0.7

charging_stations: []
communication:
  v2v_range_m: 150.0
  v2i_range_m: 300.0
  channel_bandwidth_mbps: 10.0
  packet_loss_rate: 0.02
  communication_delay_s: 0.05

algorithms:
  objectives:
    weight_travel_time: 0.7
    weight_energy_consumption: 0.2
    weight_safety: 0.1
  aco:
    alpha: 1.0
    beta: 2.0
    evaporation_rate: 0.1
    pheromone_constant: 100.0
    num_ants: 10
  bco:
    colony_size: 10
    max_scout_iterations: 5
    loyalty_threshold: 0.6
  pso:
    swarm_size: 10
    w_inertia: 0.7
    c1_personal: 1.5
    c2_global: 1.5
  e3_hybrid:
    max_iterations: 5
